version: "3.9"

services:
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8005:8005"
    env_file:
      - ./auth-service/.env
    restart: unless-stopped

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "8001:8001"
    env_file:
      - ./inventory-service/.env
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    env_file:
      - ./api-gateway/.env
    restart: unless-stopped
    depends_on:
      - auth-service
      - inventory-service