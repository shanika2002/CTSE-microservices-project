name: Node Microservices CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

    # Step 1 - Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2 - Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    # Step 3 - Install dependencies
    - name: Install Auth Service
      run: |
        cd auth-service
        npm install

    - name: Install Inventory Service
      run: |
        cd inventory-service
        npm install

    - name: Install API Gateway
      run: |
        cd api-gateway
        npm install

    # Step 4 - Login to DockerHub
    - name: DockerHub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 5 - Build Auth Service image
    - name: Build Auth Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service ./auth-service

    # Step 6 - Push Auth Service image
    - name: Push Auth Service
      run: docker push ${{ secrets.DOCKER_USERNAME }}/auth-service

    # Step 7 - Build Inventory Service image
    - name: Build Inventory Service
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/inventory-service ./inventory-service

    # Step 8 - Push Inventory Service image
    - name: Push Inventory Service
      run: docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service

    # Step 9 - Build API Gateway image
    - name: Build API Gateway
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway ./api-gateway

    # Step 10 - Push API Gateway image
    - name: Push API Gateway
      run: docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway