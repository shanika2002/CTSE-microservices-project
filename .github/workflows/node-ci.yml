name: Node Microservices CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-test-and-push:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - inventory-service
          - api-gateway

    steps:

    # Step 1 - Checkout repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2 - Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: ${{ matrix.service }}/package-lock.json

    # Step 3 - Install dependencies for each service
    - name: Install dependencies
      working-directory: ${{ matrix.service }}
      run: npm install

    # Step 4 - Run tests if available
    # This will not fail if no test script exists
    - name: Run tests if available
      working-directory: ${{ matrix.service }}
      run: npm test --if-present

    # Step 5 - Login to DockerHub
    - name: DockerHub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 6 - Generate short commit SHA for version tagging
    - name: Generate image tags
      id: vars
      run: |
        SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
        echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

    # Step 7 - Build Docker image for the current service
    # This creates two tags:
    # 1. latest
    # 2. sha-<commit>
    - name: Build Docker image
      run: |
        docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:sha-${{ steps.vars.outputs.short_sha }} \
          ./${{ matrix.service }}

    # Step 8 - Push Docker image tags to DockerHub
    - name: Push Docker image tags
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:sha-${{ steps.vars.outputs.short_sha }}